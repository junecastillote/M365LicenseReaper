<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: aptos, calibri, "Segoe UI", arial, sans-serif;
        text-align: left;
      }

      h2,
      h3 {
        margin: 0;
      }

      table {
        border-collapse: collapse;
        border: 1px solid #dddddd;
        width: 100%;
      }

      th,
      td {
        border: 1px solid #dddddd;
        padding: 5px;
        text-align: left;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* Status column styles */
      .pending {
        background-color: #d6eaf8;
        color: #1f77c5;
      }

      .completed {
        background-color: #d5f5e3;
        color: #1d8348;
      }

      .canceled {
        background-color: #fdebd0;
        color: #af601a;
      }
    </style>
  </head>

  <body>
    <h2>vOrganization</h2>
    <h3>vReportTitle</h3>
    <hr />
    <table style="border-collapse: collapse; border: 1px solid #dddddd">
      <tr>
        <th>Ticket</th>
        <th>Username</th>
        <th>Status</th>
        <th>Created Date</th>
        <th>Due Date</th>
        <th>Completed Date</th>
        <th>Owner</th>
        <th>Message</th>
      </tr>
      vTableRows
    </table>
    <hr />
  </body>
</html>
